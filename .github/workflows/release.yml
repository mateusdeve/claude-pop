name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win32

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Make distributables
        run: npx electron-forge make

      - name: Generate update manifest (macOS)
        if: matrix.platform == 'darwin'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd out/make
          ZIP=$(find . -name '*.zip' | head -1)
          if [ -n "$ZIP" ]; then
            SHA512=$(shasum -a 512 "$ZIP" | awk '{print $1}')
            SIZE=$(stat -f%z "$ZIP" 2>/dev/null || stat -c%s "$ZIP")
            BASENAME=$(basename "$ZIP")
            cat > latest-mac.yml <<EOF
          version: ${VERSION}
          files:
            - url: ${BASENAME}
              sha512: ${SHA512}
              size: ${SIZE}
          path: ${BASENAME}
          sha512: ${SHA512}
          releaseDate: '$(date -u +%Y-%m-%dT%H:%M:%S.000Z)'
          EOF
          fi

      - name: Generate update manifest (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd out/make
          DEB=$(find . -name '*.deb' | head -1)
          if [ -n "$DEB" ]; then
            SHA512=$(sha512sum "$DEB" | awk '{print $1}')
            SIZE=$(stat -c%s "$DEB")
            BASENAME=$(basename "$DEB")
            cat > latest-linux.yml <<EOF
          version: ${VERSION}
          files:
            - url: ${BASENAME}
              sha512: ${SHA512}
              size: ${SIZE}
          path: ${BASENAME}
          sha512: ${SHA512}
          releaseDate: '$(date -u +%Y-%m-%dT%H:%M:%S.000Z)'
          EOF
          fi

      - name: Generate update manifest (Windows)
        if: matrix.platform == 'win32'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd out/make
          EXE=$(find . -name '*.exe' | head -1)
          if [ -n "$EXE" ]; then
            SHA512=$(sha512sum "$EXE" | awk '{print $1}')
            SIZE=$(stat -c%s "$EXE")
            BASENAME=$(basename "$EXE")
            cat > latest.yml <<EOF
          version: ${VERSION}
          files:
            - url: ${BASENAME}
              sha512: ${SHA512}
              size: ${SIZE}
          path: ${BASENAME}
          sha512: ${SHA512}
          releaseDate: '$(date -u +%Y-%m-%dT%H:%M:%S.000Z)'
          EOF
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: claude-pop-${{ matrix.platform }}
          path: out/make/**/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
