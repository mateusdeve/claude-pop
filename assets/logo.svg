<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1225"/>
      <stop offset="100%" style="stop-color:#2d1f3d"/>
    </linearGradient>
    <linearGradient id="bubble" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8734a"/>
      <stop offset="100%" style="stop-color:#d4553a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e6b;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#e8734a;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#e8734a" flood-opacity="0.35"/>
    </filter>
    <filter id="blur-bg" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>

  <!-- Glow behind bubble -->
  <ellipse cx="256" cy="260" rx="140" ry="120" fill="url(#glow)" filter="url(#blur-bg)"/>

  <!-- Chat bubble body -->
  <g filter="url(#shadow)">
    <rect x="116" y="130" width="280" height="200" rx="40" fill="url(#bubble)"/>
    <!-- Bubble tail -->
    <path d="M200 330 L170 380 L240 330" fill="url(#bubble)"/>
  </g>

  <!-- Eyes -->
  <ellipse cx="205" cy="220" rx="22" ry="26" fill="white" opacity="0.95"/>
  <ellipse cx="307" cy="220" rx="22" ry="26" fill="white" opacity="0.95"/>

  <!-- Pupils -->
  <ellipse cx="212" cy="224" rx="12" ry="14" fill="#1a1225"/>
  <ellipse cx="314" cy="224" rx="12" ry="14" fill="#1a1225"/>

  <!-- Eye shine -->
  <circle cx="218" cy="216" r="5" fill="white" opacity="0.9"/>
  <circle cx="320" cy="216" r="5" fill="white" opacity="0.9"/>

  <!-- Smile -->
  <path d="M220 270 Q256 300 292 270" stroke="white" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.9"/>

  <!-- Claude asterisk sparkle on top right -->
  <g transform="translate(340, 130) scale(0.5)" opacity="0.9">
    <path d="M0,-30 L5,-8 L28,-16 L12,2 L30,20 L8,12 L0,34 L-8,12 L-30,20 L-12,2 L-28,-16 L-5,-8 Z"
          fill="#fbbf24" stroke="none"/>
  </g>

  <!-- Small sparkles -->
  <circle cx="140" cy="160" r="4" fill="#fbbf24" opacity="0.7"/>
  <circle cx="380" cy="180" r="3" fill="#fbbf24" opacity="0.5"/>
  <circle cx="360" cy="360" r="3.5" fill="#34d399" opacity="0.6"/>

  <!-- "pop" text hint at bottom -->
  <text x="256" y="430" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Rounded', sans-serif" font-size="42" font-weight="800" letter-spacing="6" fill="white" opacity="0.15">POP</text>
</svg>
